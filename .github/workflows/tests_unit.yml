name: Unit tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: "Build + unit tests"
    runs-on: ubuntu-latest

    steps:

    - name: Check out code into the Go module directory
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
      with:
        go-version-file: go.mod

    - name: Build
      run: |
        make build

    # The end-to-end tests in ./cmd require a CLOUDFLARE_TOKEN secret and run on
    # a schedule (see tests.yml). Here we only run the unit tests, which need no
    # secret and can therefore run on pull requests from forks. The end-to-end
    # tests self-skip when CLOUDFLARE_TOKEN is unset.
    - name: Run unit tests
      run: |
        go install github.com/kyoh86/richgo@v0.3.12
        set -o pipefail
        make test | richgo testfilter
      env:
        RICHGO_FORCE_COLOR: 1

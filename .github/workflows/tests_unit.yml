name: Unit tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: "Build + unit tests"
    runs-on: ubuntu-latest

    steps:

    - name: Check out code into the Go module directory
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod

    - name: Build
      run: |
        make build

    # The end-to-end tests in ./cmd require a CLOUDFLARE_TOKEN secret and run on
    # a schedule (see tests.yml). Here we only run the unit tests, which need no
    # secret and can therefore run on pull requests from forks. The end-to-end
    # tests self-skip when CLOUDFLARE_TOKEN is unset.
    - name: Run unit tests
      run: |
        go install github.com/kyoh86/richgo@v0.3.12
        set -o pipefail
        make test | richgo testfilter
      env:
        RICHGO_FORCE_COLOR: 1
